
# 1. HTTP (Port 80) -> HTTPS (Port 443) 리다이렉트
server {
    listen 80;
    server_name i14e208.p.ssafy.io;

    # Certbot 인증을 위한 경로
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 모든 요청은 HTTPS로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

# 2. HTTPS (Port 443) - 메인 서버 설정
server {
    listen 443 ssl; 
    server_name i14e208.p.ssafy.io; 

    # SSL 인증서 설정 (Certbot 경로)
    ssl_certificate /etc/letsencrypt/live/i14e208.p.ssafy.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/i14e208.p.ssafy.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    
    # [추가] 이미지 업로드를 위해 용량 제한을 10MB(또는 그 이상)로 늘림
    client_max_body_size 10M;

    # Docker 내부 DNS Resolver (변수로 proxy_pass 할때 필요한 설정)
    resolver 127.0.0.11 valid=5s;

    # 프런트엔드 배포된 웹서버 -> 루트 경로
    location / {

        root /usr/share/nginx/dist; # 호스트로 부터 마운트 받음
        index index.html;
        try_files $uri $uri/ /index.html; # SPA 라우팅 문제 해결용
    }

    # DB작업용 springboot 호출 -> /api/db/
    location /api/db {
	      
	      # DB작업용 dbwas컨테이너는 포트포워딩 없이 같은 도커 네트워크 상으로 연결
	      # 컨테이너명 : dbwas
        proxy_pass http://dbwas:8080;

        # 실제 접속자 정보 전달
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }
    
    # 관상분석용 fast api 호출 -> /api/face/
    location /api/face {
	      
	      # 관상분석 fast api컨테이너는 포트포워딩 없이 같은 도커 네트워크 상으로 연결
	      # 컨테이너명 : face
        proxy_pass http://face:8000;

        # 실제 접속자 정보 전달
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }
    
    # 이미지 생성용 fast api 호출 -> /api/image/
    location /api/image {
	      
	      # 이미지생성 fast api컨테이너는 포트포워딩 없이 같은 도커 네트워크 상으로 연결
	      # 컨테이너명 : image
        proxy_pass http://image:8000;

        # 실제 접속자 정보 전달
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }
    
    # welstory api 호출용 fast api 호출 -> /api/welstory/
    location /api/welstory {
	      
	      # was 컨테이너는 포트포워딩 없이 같은 도커 네트워크 상으로 연결
	      # 컨테이너명 : welstory
        proxy_pass http://welstory:8000;

        # 실제 접속자 정보 전달
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

    }
}