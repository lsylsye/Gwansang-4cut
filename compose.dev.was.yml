services:

  mysql:
    container_name: mysql
    image: mysql:8.0
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB_NAME}
      MYSQL_USER: ${MYSQL_USERNAME}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      TZ: Asia/Seoul
    ports:
      - "3307:3306" 
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
     
  redis:
    image: redis/redis-stack-server:latest
    container_name: redis
    ports:
      - "6379:6379" 
    volumes:
      - redis_data:/data
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-stack-server --appendonly yes

  dbwas:
    container_name: dbwas
    env_file:
      - .env
    build:
      context: ./server 
      dockerfile: dbwas.Dockerfile
    ports:
      - "8080:8080" 
    environment:
      - DB_HOST=mysql     # Docker 네트워크에서는 서비스 이름 사용
      - DB_PORT=3306      # 컨테이너 내부 포트 (외부 포트 3307 아님)
      - MYSQL_DATABASE=${MYSQL_DB_NAME}
      - MYSQL_USER=${MYSQL_USERNAME}
      - MYSQL_PASSWORD=${MYSQL_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  face:
    build:
      context: ./AItestFile_saju/python
      dockerfile: face.Dockerfile
    container_name: face
    env_file:
      - .env
    environment:
      - GMS_KEY=${GMS_KEY}
      - GMS_BASE_URL=${GMS_BASE_URL}
      - USE_REDIS_RAG=${USE_REDIS_RAG:-false}
      - REDIS_HOST=redis  
      - WELSTORY_API_URL=${WELSTORY_API_URL:-http://welstory:8000} # 같은 네트워크에서는 서비스 이름 사용
    ports:
      - "8000:8000" 
    depends_on:
      redis:
        condition: service_healthy
      welstory:
        condition: service_started
    restart: unless-stopped

  image:
    build:
      context: ./server/ai-server
      dockerfile: image.Dockerfile
    container_name: image
    env_file:
      - .env
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "8001:8000" 
    restart: unless-stopped

  welstory:
    build:
      context: ./welstoryLunch
      dockerfile: welstory.Dockerfile
    container_name: welstory
    environment:
      - MATTERMOST_BASE_URL=${MATTERMOST_BASE_URL:-https://meeting.ssafy.com}
      - MATTERMOST_WEBHOOK_PATHS=${MATTERMOST_WEBHOOK_PATHS:-["/hooks/채널1경로","/hooks/채널2경로"]}
      - WELSTORY_USERNAME=${WELSTORY_USERNAME:-웰스토리아이디}
      - WELSTORY_PASSWORD=${WELSTORY_PASSWORD:-웰스토리비밀번호}
    env_file:
      - .env
    ports:
      - "8002:8000"
    restart: unless-stopped

volumes:
  mysql-data:
  redis_data: