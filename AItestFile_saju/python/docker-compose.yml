version: '3.8'

services:
  redis:
    image: redis/redis-stack-server:latest
    container_name: saju-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-stack-server --appendonly yes

  saju-face-api:
    build:
      context: ..  # 상위 디렉토리를 빌드 컨텍스트로 설정
      dockerfile: python/Dockerfile
    container_name: saju-face-api
    ports:
      - "8000:8000"
    environment:
      - GMS_KEY=${GMS_KEY}
      - GMS_BASE_URL=https://gms.ssafy.io/gmsapi/api.openai.com/v1/responses
      - USE_REDIS_RAG=${USE_REDIS_RAG:-false}
      - REDIS_HOST=redis  # Docker Compose 네트워크 내부에서는 서비스 이름 사용
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  redis_data:
